openapi: 3.1.0
info:
  title: CLOTH.AI API (Draft)
  version: 0.0.0
  description: >
    Черновик контрактов для MVP. Цель: согласовать фронт/бэк по DTO и флоу:
    каталог/остатки, создание заказа, статусы, платежи SmartPay.
servers:
  - url: https://api.example.com
tags:
  - name: catalog
  - name: orders
  - name: payments
  - name: admin
paths:
  /v1/catalog:
    get:
      tags: [catalog]
      summary: List catalog items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogListResponse"
  /v1/orders:
    post:
      tags: [orders]
      summary: Create order (online/cod/reserve)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
  /v1/orders/{orderId}:
    get:
      tags: [orders]
      summary: Get order status
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOrderResponse"
        "404":
          description: Not found
  /v1/payments/smartpay/intent:
    post:
      tags: [payments]
      summary: Create SmartPay payment intent for order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                orderId:
                  type: string
              required: [orderId]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  provider:
                    const: smartpay
                  paymentUrl:
                    type: string
                required: [provider, paymentUrl]
  /v1/admin/login:
    post:
      tags: [admin]
      summary: Admin JWT login (dashboard)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                password: { type: string }
              required: [password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  accessToken: { type: string }
                required: [accessToken]
  /v1/catalog/items/{itemId}/upload:
    post:
      tags: [catalog]
      summary: Upload product photo (multipart) — admin only
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: Updated catalog row
  /v1/catalog/items/{itemId}/generate-ai:
    post:
      tags: [catalog]
      summary: Queue OpenAI image generation — admin only
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  queued: { type: boolean, const: true }
                required: [queued]
components:
  schemas:
    MoneyTjs:
      type: number
      description: Money in TJS (minor units TBD)
    ModelType:
      type: string
      enum: [tall, mid, curvy]
    ProductCategory:
      type: string
      enum: [tops, bottoms, dresses]
    ProductSize:
      type: string
      enum: [XS, S, M, L, XL]
    CheckoutMethod:
      type: string
      enum: [online, cod, reserve]
    OrderStatus:
      type: string
      enum:
        - created
        - paid
        - reserved
        - awaiting_cod
        - packing
        - shipping
        - delivered
        - cancelled
    CatalogItemDto:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string }
        category: { $ref: "#/components/schemas/ProductCategory" }
        priceTjs: { $ref: "#/components/schemas/MoneyTjs" }
        coverUrl: { type: string }
        modelImages:
          type: object
          additionalProperties: { type: string }
        sizes:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              size: { $ref: "#/components/schemas/ProductSize" }
              inStock: { type: boolean }
            required: [size, inStock]
      required: [id, title, category, priceTjs, coverUrl, modelImages, sizes]
    CatalogListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogItemDto" }
      required: [items]
    CreateOrderRequest:
      type: object
      additionalProperties: false
      properties:
        method: { $ref: "#/components/schemas/CheckoutMethod" }
        modelType:
          anyOf:
            - $ref: "#/components/schemas/ModelType"
            - type: "null"
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              productId: { type: string }
              size: { $ref: "#/components/schemas/ProductSize" }
              qty: { type: integer, minimum: 1 }
            required: [productId, size, qty]
      required: [method, items, modelType]
    CreateOrderResponse:
      type: object
      additionalProperties: false
      properties:
        orderId: { type: string }
        status: { $ref: "#/components/schemas/OrderStatus" }
        totalTjs: { $ref: "#/components/schemas/MoneyTjs" }
        payment:
          anyOf:
            - type: "null"
            - type: object
              additionalProperties: false
              properties:
                provider: { const: smartpay }
                paymentUrl: { type: string }
              required: [provider, paymentUrl]
      required: [orderId, status, totalTjs]
    GetOrderResponse:
      type: object
      additionalProperties: false
      properties:
        orderId: { type: string }
        status: { $ref: "#/components/schemas/OrderStatus" }
        createdAtIso: { type: string }
        method: { $ref: "#/components/schemas/CheckoutMethod" }
      required: [orderId, status, createdAtIso, method]

